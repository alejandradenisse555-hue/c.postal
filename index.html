<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Código Postal</title>
</head>
<body>

    <h2>Validación de Código Postal</h2>

    <form>

        <label for="cp">Código Postal:</label><br>
        <input 
            type="text" 
            id="cp" 
            name="cp"
            pattern="[0-9]{5}" 
            maxlength="5"
            placeholder="Ej. 50400"
            required
        ><br><br>

        <button type="submit">Enviar</button>

    </form>

</body>
</html>
