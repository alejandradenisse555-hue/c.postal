<!-- Actividad 2: Código Postal -->
<div class="form-group">
    <label for="codigo_postal">Código Postal:</label>
    <input 
        type="text" 
        id="codigo_postal" 
        name="codigo_postal" 
        pattern="[0-9]{5}" 
        maxlength="5" 
        placeholder="Ingresa 5 números" 
        required
    >
    <small>Debe escribir exactamente 5 números.</small>
</div>
